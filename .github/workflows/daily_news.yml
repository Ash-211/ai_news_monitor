name: Daily AI News Ingestion

on:
  schedule:
    # Runs at 16:30 UTC every day (which is exactly 10:00 PM IST)
    - cron: '30 16 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # or whichever version you are using
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Fetcher and ML Pipeline
        env:
          # We will pass the secrets securely from GitHub Settings
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          python -m src.ingestion.run_once
